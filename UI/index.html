<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A basic Health Status Page">
    <title>Health Status Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 class="title">Custom HealthStatus</h1>
    </header>
    <main>
        <form class="link-form" onSubmit="handleSubmit(event)">
            <label for="link">Enter a link:</label>
            <input class="link-input"type="url" id="link" name="link" required>
            <button class="link-submit-button" type="submit">Submit</button>
        </form>
        <section id="status-section"></section>
    </main>
    <footer>
        <p>&copy; 2026 Giovanny Albarracin</p>
    </footer>
    <script src="index.js"></script>
</body>
</html>
